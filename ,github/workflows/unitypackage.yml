name: Create Unity Package

on:
  push:
    tags:
      - 'v*'  # v1.0.0, v2.1.3 ...

jobs:
  build-package:
    name: Build Unity Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Generate meta file list
        run: |
          # Create metaList file excluding stuff I don't care about 
          find Assets/ -name "*.meta" | grep -v -E "(package\.json\.meta|readme\.md\.meta|README\.md\.meta)" > metaList
          
          echo "=== Files to be packaged ==="
          cat metaList
          echo "=== Total files: $(wc -l < metaList) ==="

      - name: Create output directory
        run: mkdir -p build

      - name: Create Unity Package
        uses: pCYSl5EDgo/create-unitypackage@master
        with:
          package-path: 'build/${{ github.event.repository.name }}-${{ github.ref_name }}.unitypackage'
          include-files: metaList

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-package-${{ github.ref_name }}
          path: build/*.unitypackage
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/*.unitypackage
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}