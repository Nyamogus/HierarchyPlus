name: Create Unity Package

on:
  push:
    tags:
      - 'v*'  # v1.0.0, v2.1.3 ...

jobs:
  build-package:
    name: Build Unity Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Prepare package structure
        run: |
          # Structure for Unity packages path
          PACKAGE_PATH="Packages/com.rainy.${{ github.event.repository.name }}"
          mkdir -p "$PACKAGE_PATH"
          rsync -av --exclude='.git' --exclude='.github' --exclude='.idea' --exclude='Packages' --exclude='build' . "$PACKAGE_PATH/"
          
          # Remove unneeded stuff for package
          rm -f "$PACKAGE_PATH/package.json" "$PACKAGE_PATH/package.json.meta"
          rm -f "$PACKAGE_PATH/README.md" "$PACKAGE_PATH/README.md.meta"
          rm -f "$PACKAGE_PATH/readme.md" "$PACKAGE_PATH/readme.md.meta"

      - name: Generate meta file list
        run: |
          # Find all .meta files in the new structure
          find Packages/ -name "*.meta" -type f > metaList
          
          echo "=== Files to be packaged ==="
          cat metaList
          echo "=== Total files: $(wc -l < metaList) ==="

      - name: Create output directory
        run: mkdir -p build

      - name: Create Unity Package
        uses: pCYSl5EDgo/create-unitypackage@master
        with:
          package-path: 'build/${{ github.event.repository.name }}-${{ github.ref_name }}.unitypackage'
          include-files: metaList

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: unity-package-${{ github.ref_name }}
          path: build/*.unitypackage
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: build/*.unitypackage
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
